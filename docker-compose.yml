version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: deliverytech-redis
    ports:
      - "6379:6379"

  zipkin:
    image: openzipkin/zipkin
    container_name: deliverytech-zipkin
    ports:
      - "9411:9411"

  app:
    build: .
    container_name: deliverytech-container
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - ZIPKIN_SERVER_URL=http://zipkin:9411
    depends_on:
      - redis
      - zipkin