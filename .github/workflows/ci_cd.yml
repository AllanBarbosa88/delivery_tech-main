name: Spring Boot CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Permissões necessárias para que o GitHub Actions consiga publicar imagens no pacote do repositório
permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # PASSO 1: Agora os testes do JUnit/Mockito rodam com H2 e Redis disponíveis!
    - name: Run Tests and Build with Maven
      run: mvn clean install
      env:
        JWT_SECRET: "chave-de-teste-temporaria-para-o-ambiente-de-build-do-ci"
        JWT_EXPIRATION: "3600000"

       # PASSO 2: Autenticação automática no Registro de Containers do GitHub
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # PASSO 3: Build com nome fixo em minúsculo (Substitua "allan" pelo seu usuário do GitHub em minúsculo se preferir)
    - name: Build Docker image
      run: docker build -t ghcr.io/allanbarbosa88/delivery-api:latest .

    - name: Run Docker container for Health Check
      run: |
        docker run -d \
          -p 8080:8080 \
          --net=host \
          -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
          -e JWT_EXPIRATION="${{ secrets.JWT_EXPIRATION }}" \
          ghcr.io/allanbarbosa88/delivery-api:latest

    - name: Test application health
      run: |
        echo "Aguardando a API ficar online (Health Check)..."
        timeout 40 bash -c 'until curl -f -s http://localhost:8080/actuator/health > /dev/null; do echo "Aguardando..."; sleep 2; done'
        echo "API inicializada com sucesso!"

    # PASSO 4: Se o Health Check passou, publica a imagem de forma segura
    - name: Push Docker image to GHCR
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: docker push ghcr.io/allanbarbosa88/delivery-api:latest
