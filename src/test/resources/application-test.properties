# Banco H2 em memória (mesmo do main, mas isolado)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
 
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
 
# Valores fixos para JWT (evita falha de variável de ambiente ausente)
jwt.secret=chave-secreta-para-testes-unitarios-123456
jwt.expiration=86400000
 
# Desabilitar DevTools em testes
spring.devtools.restart.enabled=true
# Força o desligamento dos acessos do Actuator apenas durante os testes
management.endpoint.prometheus.access=NONE
management.endpoint.metrics.access=NONE
management.endpoint.info.access=NONE
management.endpoints.web.exposure.include=health

