# ==========================================
# CONFIGURAÇÕES DA APLICAÇÃO E SERVIDOR
# ==========================================
spring.application.name=deliverytech_fat
server.port=8080

# ==========================================
# CONFIGURAÇÕES DO H2 DATABASE
# ==========================================
spring.datasource.url=jdbc:h2:mem:delivery;IFEXISTS=FALSE;DB_CLOSE_ON_EXIT=false;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-port=8082

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true
spring.jpa.defer-datasource-initialization=true
spring.data.web.pageable.max-page-size=100

# ==========================================
# DESENVOLVIMENTO E LOGS
# ==========================================
spring.devtools.restart.enabled=true
logging.level.org.springframework.web=DEBUG

# ==========================================
# SEGURANÇA E JWT
# ==========================================
# Inclui valores padrão caso as variáveis não estejam setadas no ambiente
jwt.secret=${JWT_SECRET:chave-secreta-local-de-teste-para-o-delivery-123456789}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ==========================================
# ACTUATOR, PROMETHEUS E OBSERVABILIDADE (NOVOS)
# ==========================================
management.endpoints.web.exposure.include=*
management.endpoints.web.base-path=/actuator

# Health & Métricas
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.endpoint.prometheus.access=NONE
management.endpoint.metrics.access=NONE
management.endpoint.info.access=NONE

# Tracing e Zipkin
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# Informações da Aplicação (Endpoint /info)
info.app.name=Sistema de Delivery
info.app.description=API REST para sistema de delivery com observabilidade
info.app.version=1.0.0
info.team.name=Equipe de Desenvolvimento
info.team.email=dev@delivery.co
info.app.encoding=UTF-8
info.app.java.version=21

# Configurações de monitoramento de disco e git do Actuator
management.health.diskspace.enabled=true
management.health.diskspace.threshold=10GB
management.health.db.enabled=true
management.info.env.enabled=true
management.info.git.mode=full
management.info.build.enabled=true

# Segurança básica para o Actuator
spring.security.user.roles=ACTUATOR

# ==========================================
# REDIS (CACHE DISTRIBUÍDO)
# ==========================================
# Agora aceita dinamicamente a configuração do Docker/GitHub Actions
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
